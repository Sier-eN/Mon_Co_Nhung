<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Online</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #252542);
        }

        .calculator {
            background-color: #0f0f1a;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 340px;
        }

        #display {
            width: 100%;
            height: 70px;
            background-color: #1c1c2e;
            border: none;
            outline: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #252542;
            color: #ffffff;
        }

        button:hover {
            background-color: #313158;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Màu sắc cho các nút chức năng đặc biệt */
        button.operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        button.operator:hover {
            background-color: #ffb03a;
        }

        button.clear {
            background-color: #ff453a;
            color: #ffffff;
        }

        button.clear:hover {
            background-color: #ff6961;
        }

        button.equal {
            background-color: #30d158;
            color: #ffffff;
            grid-column: span 2;
        }

        button.equal:hover {
            background-color: #40df68;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">/</button>
            <button onclick="appendValue('*')" class="operator">x</button>
            <button onclick="deleteLast()" class="operator">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()" class="equal">=</button>

            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Thêm giá trị vào màn hình
        function appendValue(val) {
            // Ngăn việc nhập nhiều dấu chấm liên tiếp trong một số (cơ bản)
            if (val === '.' && display.value.endsWith('.')) return;
            
            if (display.value === '0' && val !== '.') {
                display.value = val;
            } else {
                display.value += val;
            }
        }

        // Xóa toàn bộ màn hình
        function clearDisplay() {
            display.value = '';
        }

        // Xóa ký tự cuối cùng (Backspace)
        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        // Tính toán kết quả
        function calculate() {
            try {
                // Thay thế các ký tự hiển thị nếu cần trước khi tính toán
                let expression = display.value;
                
                if (expression) {
                    // Sử dụng Function thay vì eval để an toàn hơn một chút
                    let result = new Function('return ' + expression)();
                    
                    // Làm tròn số thập phân để tránh lỗi hiển thị kiểu 0.1 + 0.2 = 0.30000000000000004
                    if (result % 1 !== 0) {
                        result = parseFloat(result.toFixed(8));
                    }
                    
                    display.value = result;
                }
            } catch (error) {
                display.value = 'Lỗi phép tính';
                setTimeout(clearDisplay, 1500); // Tự động xóa chữ lỗi sau 1.5 giây
            }
        }

        // Hỗ trợ bấm phím từ bàn phím máy tính
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            if ((key >= '0' && key <= '9') || key === '.' || key === '+' || key === '-' || key === '*' || key === '/') {
                appendValue(key);
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Backspace') {
                deleteLast();
            } else if (key === 'Escape') {
                clearDisplay();
            }
        });
    </script>

</body>
</html>
